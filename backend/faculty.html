<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>FLEX — Faculty</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f4f6fb;
            --sidebar: #1e2d4a;
            --sidebar2: #243558;
            --top: #fff;
            --accent: #2563eb;
            --accent2: #1d4ed8;
            --green: #16a34a;
            --yellow: #ca8a04;
            --red: #dc2626;
            --orange: #ea580c;
            --text: #1e293b;
            --muted: #64748b;
            --border: #e2e8f0;
            --card: #fff;
            --radius: 12px;
            --font: 'Inter', sans-serif;
            --mono: 'JetBrains Mono', monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .sidebar {
            width: 240px;
            background: var(--sidebar);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            overflow-y: auto;
        }

        .sidebar-brand {
            padding: 24px 20px 16px;
            border-bottom: 1px solid rgba(255, 255, 255, .08);
        }

        .brand-logo {
            font-size: 22px;
            font-weight: 700;
            color: #fff;
            letter-spacing: 1px;
        }

        .brand-sub {
            font-size: 11px;
            color: rgba(255, 255, 255, .4);
            margin-top: 2px;
        }

        .sidebar-user {
            padding: 16px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, .08);
        }

        .user-name {
            font-size: 13px;
            font-weight: 600;
            color: #fff;
        }

        .user-role {
            font-size: 11px;
            color: rgba(255, 255, 255, .45);
            margin-top: 2px;
        }

        .sidebar-nav {
            padding: 12px 0;
            flex: 1;
        }

        .nav-section {
            padding: 8px 20px 4px;
            font-size: 10px;
            font-weight: 600;
            color: rgba(255, 255, 255, .3);
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 20px;
            cursor: pointer;
            color: rgba(255, 255, 255, .65);
            font-size: 13px;
            font-weight: 500;
            transition: all .15s;
            border-left: 3px solid transparent;
        }

            .nav-item:hover {
                background: rgba(255, 255, 255, .06);
                color: #fff;
            }

            .nav-item.active {
                background: rgba(37, 99, 235, .25);
                color: #fff;
                border-left-color: var(--accent);
            }

            .nav-item .icon {
                font-size: 16px;
                width: 20px;
                text-align: center;
            }

            .nav-item .coming {
                font-size: 9px;
                background: rgba(255, 255, 255, .12);
                color: rgba(255, 255, 255, .5);
                padding: 2px 6px;
                border-radius: 4px;
                margin-left: auto;
            }

        .sidebar-logout {
            padding: 16px 20px;
            border-top: 1px solid rgba(255, 255, 255, .08);
        }

        .logout-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            color: rgba(255, 255, 255, .5);
            font-size: 13px;
            cursor: pointer;
            padding: 8px 0;
        }

            .logout-btn:hover {
                color: #fff;
            }

        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .topbar {
            background: var(--top);
            border-bottom: 1px solid var(--border);
            padding: 0 28px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .topbar-title {
            font-size: 16px;
            font-weight: 600;
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .notif-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--bg);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 16px;
        }

        .content {
            flex: 1;
            overflow-y: auto;
            padding: 28px;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
        }

            .card + .card {
                margin-top: 20px;
            }

        .card-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: .8px;
            margin-bottom: 16px;
        }

        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 12px;
        }

        .tab-btn {
            background: none;
            border: none;
            padding: 8px 20px;
            font-size: 14px;
            font-weight: 600;
            color: var(--muted);
            cursor: pointer;
            border-radius: 8px;
            transition: all .15s;
        }

            .tab-btn:hover {
                background: var(--bg);
                color: var(--text);
            }

            .tab-btn.active {
                background: var(--accent);
                color: white;
            }

        .tab-content {
            display: none;
        }

            .tab-content.active {
                display: block;
            }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            margin-bottom: 16px;
        }

        .form-full {
            grid-column: 1 / -1;
        }

        .fgroup {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        label {
            font-size: 12px;
            font-weight: 600;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: .5px;
        }

        input,
        select {
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-family: var(--font);
            font-size: 14px;
            color: var(--text);
            background: #fff;
            outline: none;
            transition: border-color .15s;
        }

            input:focus,
            select:focus {
                border-color: var(--accent);
            }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border-radius: 8px;
            font-family: var(--font);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all .15s;
        }

        .btn-primary {
            background: var(--accent);
            color: #fff;
        }

            .btn-primary:hover {
                background: var(--accent2);
            }

        .btn-danger {
            background: var(--red);
            color: #fff;
        }

            .btn-danger:hover {
                opacity: .85;
            }

        .btn-outline {
            background: #fff;
            border: 1px solid var(--border);
            color: var(--text);
        }

            .btn-outline:hover {
                border-color: var(--accent);
                color: var(--accent);
            }

        .btn-sm {
            padding: 6px 14px;
            font-size: 12px;
        }

        .btn-warning {
            background: #fef3c7;
            border: 1px solid #f59e0b;
            color: #92400e;
        }

            .btn-warning:hover {
                background: #fde68a;
            }

        .btn-success {
            background: #dcfce7;
            border: 1px solid #16a34a;
            color: #15803d;
        }

            .btn-success:hover {
                background: #bbf7d0;
            }

        .timer-display {
            background: linear-gradient(135deg, #1e2d4a 0%, #243558 100%);
            border-radius: 16px;
            padding: 24px;
            text-align: center;
            margin-bottom: 20px;
            color: white;
        }

        .timer-clock {
            font-size: 64px;
            font-family: var(--mono);
            font-weight: 700;
            letter-spacing: 5px;
            margin: 10px 0;
        }

        .timer-label {
            font-size: 14px;
            opacity: 0.8;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .qr-area {
            background: linear-gradient(135deg, #1e2d4a 0%, #243558 100%);
            border-radius: 16px;
            padding: 32px;
            display: flex;
            gap: 36px;
            align-items: center;
            margin-bottom: 24px;
            color: #fff;
        }

        .qr-wrap {
            background: #fff;
            padding: 16px;
            border-radius: 12px;
            flex-shrink: 0;
            width: 220px;
            height: 220px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

            .qr-wrap img {
                width: 188px;
                height: 188px;
            }

        .qr-info {
            flex: 1;
        }

        .qr-token {
            font-family: var(--mono);
            font-size: 38px;
            font-weight: 700;
            letter-spacing: 10px;
            color: #60a5fa;
            margin: 8px 0 16px;
        }

        .stats-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px 24px;
        }

        .stat-val {
            font-size: 42px;
            font-weight: 700;
            font-family: var(--mono);
            line-height: 1;
        }

        .stat-lbl {
            font-size: 11px;
            color: var(--muted);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: .6px;
            margin-top: 4px;
        }

        .s-green { color: var(--green); }
        .s-yellow { color: var(--yellow); }
        .s-red { color: var(--red); }

        .roster-wrap {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
        }

        .roster-head {
            padding: 14px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .roster-label {
            font-size: 12px;
            font-weight: 600;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: .6px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 10px 20px;
            font-size: 11px;
            font-weight: 600;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: .6px;
            background: #f8fafc;
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 12px 20px;
            border-bottom: 1px solid #f1f5f9;
            font-size: 13px;
        }

        .roll-mono {
            font-family: var(--mono);
            font-size: 12px;
            color: var(--muted);
        }

        .sbadge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 700;
        }

        .sb-present { background: #dcfce7; color: #15803d; }
        .sb-late { background: #fef9c3; color: #854d0e; }
        .sb-absent { background: #fee2e2; color: #b91c1c; }
        .sb-opening { background: #dbeafe; color: #1d4ed8; }

        .overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .35);
            backdrop-filter: blur(3px);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }

            .overlay.show {
                display: flex;
            }

        .modal {
            background: #fff;
            border-radius: 16px;
            padding: 28px;
            width: 400px;
            max-width: 92vw;
            box-shadow: 0 20px 60px rgba(0, 0, 0, .15);
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
        }

        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: #1e293b;
            color: #fff;
            padding: 12px 20px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 500;
            transform: translateY(80px);
            transition: transform .3s;
            z-index: 200;
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .toast.show { transform: translateY(0); }

        #loginScreen {
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 999;
        }

        .login-box {
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 40px;
            width: 380px;
        }

        .login-logo {
            font-size: 28px;
            font-weight: 800;
            color: var(--accent);
            letter-spacing: 2px;
            margin-bottom: 4px;
        }

        .login-sub {
            font-size: 13px;
            color: var(--muted);
            margin-bottom: 28px;
        }

        .action-buttons {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
    </style>
</head>
<body>

    <div id="loginScreen">
        <div class="login-box">
            <div class="login-logo">FLEX</div>
            <div class="login-sub">Faculty Portal · FAST-NUCES Lahore</div>
            <div class="fgroup" style="margin-bottom:12px">
                <label>Faculty ID</label>
                <input id="loginId" placeholder="FAC-001">
            </div>
            <div class="fgroup" style="margin-bottom:20px">
                <label>Password</label>
                <input id="loginPass" type="password" placeholder="••••••">
            </div>
            <button class="btn btn-primary" style="width:100%" onclick="doLogin()">Sign In →</button>
        </div>
    </div>

    <nav class="sidebar">
        <div class="sidebar-brand">
            <div class="brand-logo">FLEX</div>
            <div class="brand-sub">Faculty Portal</div>
        </div>
        <div class="sidebar-user">
            <div class="user-name" id="sidebarName">—</div>
            <div class="user-role" id="sidebarRole">Faculty</div>
        </div>
        <div class="sidebar-nav">
            <div class="nav-section">Academic</div>
            <div class="nav-item active" onclick="showPage('attendance')"><span class="icon">✅</span>Attendance</div>
            <div class="nav-item" onclick="showPage('marks')"><span class="icon">📊</span>Marks<span class="coming">Soon</span></div>
            <div class="nav-item" onclick="showPage('grading')"><span class="icon">🎯</span>Grading<span class="coming">Soon</span></div>
            <div class="nav-section">Reports</div>
            <div class="nav-item" onclick="showPage('history')"><span class="icon">📋</span>History</div>
        </div>
        <div class="sidebar-logout">
            <div class="logout-btn" onclick="doLogout()"><span>⬅</span> Sign Out</div>
        </div>
    </nav>

    <div class="main">
        <div class="topbar">
            <div class="topbar-title" id="topbarTitle">Attendance Management</div>
            <div class="topbar-right">
                <div style="font-size:13px;color:var(--muted)" id="topbarUser">—</div>
            </div>
        </div>
        <div class="content" id="pageContent"></div>
    </div>

    <div class="overlay" id="overrideOverlay">
        <div class="modal">
            <h3>Manual Override</h3>
            <input type="hidden" id="ovRollNo">
            <div class="fgroup">
                <label>Student</label>
                <input id="ovName" disabled>
            </div>
            <div class="fgroup">
                <label>Set Status</label>
                <select id="ovStatus">
                    <option value="Present">Present</option>
                    <option value="Late">Late</option>
                    <option value="Absent">Absent</option>
                </select>
            </div>
            <div class="modal-actions">
                <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
                <button class="btn btn-primary" onclick="submitOverride()">Save</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast">✓ Success</div>

    <script>
        let faculty = null;
        let currentSession = null;
        let timerInterval = null;
        let pollInterval = null;
        let tokenExpiry = null;

        async function doLogin() {
            const id = document.getElementById('loginId').value.trim();
            const pass = document.getElementById('loginPass').value.trim();
            const r = await fetch('/api/faculty/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id, pass })
            });
            if (!r.ok) { toast('❌ Invalid credentials'); return; }
            faculty = await r.json();
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('sidebarName').textContent = faculty.name;
            document.getElementById('sidebarRole').textContent = faculty.dept + ' Dept.';
            document.getElementById('topbarUser').textContent = faculty.name;
            showPage('attendance');
        }

        function doLogout() {
            faculty = null;
            if (timerInterval) clearInterval(timerInterval);
            if (pollInterval) clearInterval(pollInterval);
            document.getElementById('loginScreen').style.display = 'flex';
        }

        function showPage(page) {
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            if (event && event.currentTarget) event.currentTarget.classList.add('active');
            document.getElementById('topbarTitle').textContent = page === 'attendance' ? 'Attendance Management' : 'Session History';
            const c = document.getElementById('pageContent');
            
            if (page === 'attendance') {
                if (currentSession && !currentSession.locked) {
                    renderLiveSession(c);
                } else {
                    renderStartSession(c);
                }
            } else if (page === 'history') {
                renderHistory(c);
            }
        }

        function renderStartSession(c) {
            const courses = (faculty?.courses || ['SE-2001']).map(c => `<option value="${c}">${c}</option>`).join('');
            const today = new Date().toISOString().split('T')[0];
            c.innerHTML = `
                <div class="card">
                    <div class="card-title">Start New Attendance Session</div>
                    <div class="form-grid">
                        <div class="fgroup">
                            <label>Course</label>
                            <select id="fCourse">${courses}</select>
                        </div>
                        <div class="fgroup">
                            <label>Section</label>
                            <select id="fSection">
                                <option value="BSE-243A">BSE-243A</option>
                                <option value="BSE-243B">BSE-243B</option>
                            </select>
                        </div>
                        <div class="fgroup">
                            <label>Session Date</label>
                            <input type="date" id="fDate" value="${today}">
                        </div>
                        <div class="fgroup form-full">
                            <label>Session Topic</label>
                            <input id="fTopic" placeholder="e.g., Requirements Elicitation">
                        </div>
                    </div>
                    <button class="btn btn-primary" onclick="startOpeningSession()">▶ Start Opening Window (10 min)</button>
                </div>
                <div class="card">
                    <div class="card-title">How It Works</div>
                    <div style="display:flex;flex-direction:column;gap:12px">
                        <div><strong>1.</strong> Start Opening Window → Students scan QR (marked as "Opening Recorded")</div>
                        <div><strong>2.</strong> Lock Opening Window when ready (or auto after 10 min)</div>
                        <div><strong>3.</strong> Start Closing Window → Students scan again (marked as LATE or PRESENT)</div>
                        <div><strong>4.</strong> Lock Attendance → Finalize and export Excel sheet</div>
                    </div>
                </div>`;
        }

        async function startOpeningSession() {
            const topic = document.getElementById('fTopic').value.trim();
            const courseCode = document.getElementById('fCourse').value;
            const section = document.getElementById('fSection').value;
            const sessionDate = document.getElementById('fDate').value;
            
            if (!topic) { toast('⚠ Enter session topic'); return; }
            
            const r = await fetch('/api/faculty/start-session', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ topic, courseCode, section, facultyId: faculty.id, facultyName: faculty.name, sessionDate })
            });
            
            const data = await r.json();
            if (!r.ok) { toast('Error: ' + data.error); return; }
            
            currentSession = { sessionId: data.sessionId, token: data.token, qrCode: data.qrCode, expiresAt: data.expiresAt, status: 'opening', startedAt: Date.now() };
            tokenExpiry = data.expiresAt;
            
            renderLiveSession(document.getElementById('pageContent'));
            startPolling();
            startTokenTimer();
            startOpeningTimer();
            toast('✅ Opening window started - 10 minutes');
        }

        function renderLiveSession(c) {
            c.innerHTML = `
                <div class="timer-display" id="timerDisplay">
                    <div class="timer-label" id="windowLabel">OPENING WINDOW</div>
                    <div class="timer-clock" id="timerClock">10:00</div>
                    <div style="font-size:12px; opacity:0.7;" id="windowStatus">Students can scan QR to record attendance</div>
                </div>
                
                <div class="action-buttons">
                    <button class="btn btn-warning" id="lockOpeningBtn" onclick="lockOpeningWindow()">🔒 Lock Opening Window</button>
                    <button class="btn btn-primary" id="startClosingBtn" style="display:none;" onclick="startClosingWindow()">▶ Start Closing Window (10 min)</button>
                    <button class="btn btn-danger" id="lockAttendanceBtn" style="display:none;" onclick="lockAttendance()">🔒 Lock Attendance & Export</button>
                    <button class="btn btn-outline" onclick="exportSession()">📊 Export Excel</button>
                </div>
                
                <div class="qr-area">
                    <div class="qr-wrap" id="qrImgWrap"><img src="${currentSession.qrCode}" style="width:188px;height:188px"></div>
                    <div class="qr-info">
                        <div style="font-size:11px;opacity:0.6;">Current Token</div>
                        <div class="qr-token" id="tokenDisp">${currentSession.token}</div>
                        <div style="font-size:12px;opacity:0.7;">Token rotates every 30 seconds</div>
                    </div>
                </div>
                
                <div class="stats-row">
                    <div class="stat"><div class="stat-val s-green" id="presentCount">0</div><div class="stat-lbl">Present</div></div>
                    <div class="stat"><div class="stat-val s-yellow" id="lateCount">0</div><div class="stat-lbl">Late</div></div>
                    <div class="stat"><div class="stat-val s-red" id="absentCount">0</div><div class="stat-lbl">Absent</div></div>
                </div>
                
                <div class="roster-wrap">
                    <div class="roster-head"><div class="roster-label">Student Roster</div><button class="btn btn-outline btn-sm" onclick="refreshRoster()">↻ Refresh</button></div>
                    <table><thead><tr><th>Roll No.</th><th>Name</th><th>Status</th><th>Override</th></tr></thead><tbody id="rosterBody"><tr><td colspan="4" style="text-align:center">Loading...</td></tr></tbody></table>
                </div>`;
        }

        let openingTimer = null;
        let openingEndTime = null;

        function startOpeningTimer() {
            if (openingTimer) clearInterval(openingTimer);
            openingEndTime = Date.now() + (10 * 60 * 1000);
            
            openingTimer = setInterval(() => {
                const remaining = Math.max(0, openingEndTime - Date.now());
                const minutes = Math.floor(remaining / 60000);
                const seconds = Math.floor((remaining % 60000) / 1000);
                const clock = document.getElementById('timerClock');
                if (clock) clock.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
                
                if (remaining <= 0) {
                    clearInterval(openingTimer);
                    lockOpeningWindow();
                }
            }, 1000);
        }

        function startClosingTimer() {
            if (openingTimer) clearInterval(openingTimer);
            const closingEndTime = Date.now() + (10 * 60 * 1000);
            
            openingTimer = setInterval(() => {
                const remaining = Math.max(0, closingEndTime - Date.now());
                const minutes = Math.floor(remaining / 60000);
                const seconds = Math.floor((remaining % 60000) / 1000);
                const clock = document.getElementById('timerClock');
                if (clock) clock.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
                
                if (remaining <= 0) {
                    clearInterval(openingTimer);
                    toast('⏰ Closing window ended - Please lock attendance');
                }
            }, 1000);
        }

        async function lockOpeningWindow() {
            const r = await fetch(`/api/faculty/lock-opening/${currentSession.sessionId}`, { method: 'POST' });
            if (!r.ok) { toast('Error locking opening window'); return; }
            
            clearInterval(openingTimer);
            currentSession.status = 'opening_locked';
            
            const timerDisplay = document.getElementById('timerDisplay');
            const lockOpeningBtn = document.getElementById('lockOpeningBtn');
            const startClosingBtn = document.getElementById('startClosingBtn');
            
            timerDisplay.style.background = 'linear-gradient(135deg, #4a1e2d, #2d1e3a)';
            document.getElementById('windowLabel').textContent = 'OPENING WINDOW LOCKED';
            document.getElementById('windowStatus').textContent = 'Opening window closed. Start closing window now.';
            lockOpeningBtn.style.display = 'none';
            startClosingBtn.style.display = 'inline-flex';
            
            toast('🔒 Opening window locked');
        }

        async function startClosingWindow() {
            const r = await fetch(`/api/faculty/start-closing/${currentSession.sessionId}`, { method: 'POST' });
            if (!r.ok) { toast('Error starting closing window'); return; }
            
            currentSession.status = 'closing';
            
            const timerDisplay = document.getElementById('timerDisplay');
            const startClosingBtn = document.getElementById('startClosingBtn');
            const lockAttendanceBtn = document.getElementById('lockAttendanceBtn');
            
            timerDisplay.style.background = 'linear-gradient(135deg, #4a3a1e, #3a2d1e)';
            document.getElementById('windowLabel').textContent = 'CLOSING WINDOW';
            document.getElementById('windowStatus').innerHTML = '⚠️ Students scanning now will be marked LATE';
            startClosingBtn.style.display = 'none';
            lockAttendanceBtn.style.display = 'inline-flex';
            
            startClosingTimer();
            toast('⏰ Closing window started - 10 minutes');
        }

        async function lockAttendance() {
            if (!confirm('Lock attendance? Students without both scans will be marked ABSENT. An Excel sheet will be generated.')) return;
            
            const r = await fetch(`/api/faculty/lock-session/${currentSession.sessionId}`, { method: 'POST' });
            if (!r.ok) { toast('Error locking attendance'); return; }
            
            clearInterval(openingTimer);
            clearInterval(pollInterval);
            clearInterval(tokenTimer);
            
            currentSession.locked = true;
            toast('🔒 Attendance locked - Excel sheet generated');
            
            setTimeout(() => {
                currentSession = null;
                showPage('attendance');
            }, 2000);
        }

        async function exportSession() {
            if (!currentSession) { toast('No active session'); return; }
            window.open(`/api/faculty/export/${currentSession.sessionId}`, '_blank');
        }

        async function refreshRoster() { await pollSession(); }

        async function pollSession() {
            if (!currentSession) return;
            const r = await fetch(`/api/faculty/session/${currentSession.sessionId}`);
            if (!r.ok) return;
            const data = await r.json();
            
            if (data.token && data.token !== currentSession.token) {
                currentSession.token = data.token;
                const tokenDisp = document.getElementById('tokenDisp');
                const qrWrap = document.getElementById('qrImgWrap');
                if (tokenDisp) tokenDisp.textContent = data.token;
                if (qrWrap && data.qrCode) qrWrap.innerHTML = `<img src="${data.qrCode}" style="width:188px;height:188px">`;
            }
            
            document.getElementById('presentCount').textContent = data.presentCount;
            document.getElementById('lateCount').textContent = data.lateCount;
            document.getElementById('absentCount').textContent = data.absentCount;
            
            const tbody = document.getElementById('rosterBody');
            if (tbody && data.roster) {
                tbody.innerHTML = data.roster.map(s => {
                    let cls = 'sb-absent';
                    if (s.status.includes('Present')) cls = 'sb-present';
                    else if (s.status.includes('Late')) cls = 'sb-late';
                    else if (s.status.includes('Opening')) cls = 'sb-opening';
                    return `<tr><td class="roll-mono">${s.rollNo}</td><td>${s.name}</td><td><span class="sbadge ${cls}">${s.status}</span></td><td><button class="btn btn-outline btn-sm" onclick="openOverride('${s.rollNo}','${s.name}')">Override</button></td></tr>`;
                }).join('');
            }
        }

        let tokenTimer = null;
        function startTokenTimer() {
            if (tokenTimer) clearInterval(tokenTimer);
            tokenTimer = setInterval(async () => {
                if (!currentSession || currentSession.locked) return;
                const r = await fetch(`/api/faculty/session/${currentSession.sessionId}`);
                const data = await r.json();
                if (data.token && data.token !== currentSession.token) {
                    currentSession.token = data.token;
                    const tokenDisp = document.getElementById('tokenDisp');
                    const qrWrap = document.getElementById('qrImgWrap');
                    if (tokenDisp) tokenDisp.textContent = data.token;
                    if (qrWrap && data.qrCode) qrWrap.innerHTML = `<img src="${data.qrCode}" style="width:188px;height:188px">`;
                }
            }, 2000);
        }

        function startPolling() {
            if (pollInterval) clearInterval(pollInterval);
            pollInterval = setInterval(pollSession, 3000);
        }

        async function renderHistory(c) {
            const r = await fetch(`/api/faculty/history?facultyId=${faculty.id}`);
            const sessions = await r.json();
            
            if (!sessions.length) {
                c.innerHTML = '<div class="card"><div style="text-align:center;padding:40px">No past sessions found</div></div>';
                return;
            }
            
            c.innerHTML = sessions.map(s => `
                <div class="card" style="margin-bottom:20px">
                    <div style="display:flex;justify-content:space-between;align-items:start;flex-wrap:wrap">
                        <div>
                            <h3 style="font-size:16px;margin-bottom:5px">${s.topic}</h3>
                            <div style="font-size:12px;color:var(--muted)">${s.courseCode} · ${s.section} · ${new Date(s.startedAt).toLocaleString()}</div>
                            <div style="margin-top:10px;display:flex;gap:15px">
                                <span style="color:var(--green)">✅ Present: ${s.present}</span>
                                <span style="color:var(--yellow)">⏰ Late: ${s.late}</span>
                                <span style="color:var(--red)">❌ Absent: ${s.absent}</span>
                            </div>
                        </div>
                        <button class="btn btn-outline btn-sm" onclick="window.open('/api/faculty/export/${s.sessionId}', '_blank')">📊 Export Excel</button>
                    </div>
                </div>
            `).join('');
        }

        function openOverride(rollNo, name) {
            document.getElementById('ovRollNo').value = rollNo;
            document.getElementById('ovName').value = name;
            document.getElementById('overrideOverlay').classList.add('show');
        }

        function closeModal() { document.getElementById('overrideOverlay').classList.remove('show'); }

        async function submitOverride() {
            const rollNo = document.getElementById('ovRollNo').value;
            const status = document.getElementById('ovStatus').value;
            await fetch(`/api/faculty/override/${currentSession.sessionId}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ rollNo, status, reason: 'Manual override' })
            });
            closeModal();
            await pollSession();
            toast('✓ Override saved');
        }

        function toast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }
    </script>
</body>
</html>
