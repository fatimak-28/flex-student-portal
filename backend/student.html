<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=yes">
    <title>FLEX — Student Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        :root {
            --bg: #f4f6fb;
            --sidebar: #1e2d4a;
            --sidebar2: #243558;
            --accent: #2563eb;
            --accent2: #1d4ed8;
            --green: #16a34a;
            --yellow: #ca8a04;
            --red: #dc2626;
            --text: #1e293b;
            --muted: #64748b;
            --border: #e2e8f0;
            --card: #fff;
            --radius: 12px;
            --font: 'Inter',sans-serif;
            --mono: 'JetBrains Mono',monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            display: flex;
            height: 100vh;
            overflow: hidden
        }

        /* ── Sidebar (classic) ── */
        .sidebar {
            width: 240px;
            background: var(--sidebar);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            overflow-y: auto
        }

        .sidebar-brand {
            padding: 24px 20px 16px;
            border-bottom: 1px solid rgba(255,255,255,.08)
        }

        .brand-logo {
            font-size: 22px;
            font-weight: 700;
            color: #fff;
            letter-spacing: 1px
        }

        .brand-sub {
            font-size: 11px;
            color: rgba(255,255,255,.4);
            margin-top: 2px
        }

        .sidebar-user {
            padding: 16px 20px;
            border-bottom: 1px solid rgba(255,255,255,.08)
        }

        .user-name {
            font-size: 13px;
            font-weight: 600;
            color: #fff
        }

        .user-roll {
            font-size: 11px;
            color: rgba(255,255,255,.4);
            margin-top: 2px;
            font-family: var(--mono)
        }

        .nav-section {
            padding: 8px 20px 4px;
            font-size: 10px;
            font-weight: 600;
            color: rgba(255,255,255,.3);
            letter-spacing: 1.5px;
            text-transform: uppercase
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 20px;
            cursor: pointer;
            color: rgba(255,255,255,.65);
            font-size: 13px;
            font-weight: 500;
            transition: all .15s;
            border-left: 3px solid transparent
        }

            .nav-item:hover {
                background: rgba(255,255,255,.06);
                color: #fff
            }

            .nav-item.active {
                background: rgba(37,99,235,.25);
                color: #fff;
                border-left-color: var(--accent)
            }

            .nav-item .icon {
                font-size: 16px;
                width: 20px;
                text-align: center
            }

            .nav-item .coming {
                font-size: 9px;
                background: rgba(255,255,255,.12);
                color: rgba(255,255,255,.5);
                padding: 2px 6px;
                border-radius: 4px;
                margin-left: auto
            }

        .sidebar-logout {
            padding: 16px 20px;
            border-top: 1px solid rgba(255,255,255,.08);
            margin-top: auto
        }

        .logout-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            color: rgba(255,255,255,.5);
            font-size: 13px;
            cursor: pointer
        }

            .logout-btn:hover {
                color: #fff
            }

        /* ── Main ── */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden
        }

        .topbar {
            background: var(--card);
            border-bottom: 1px solid var(--border);
            padding: 0 28px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0
        }

        .topbar-title {
            font-size: 16px;
            font-weight: 600
        }

        .content {
            flex: 1;
            overflow-y: auto;
            padding: 28px
        }

        /* Cards & components */
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px
        }

            .card + .card, .card + div {
                margin-top: 20px
            }

        .card-title {
            font-size: 12px;
            font-weight: 600;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: .8px;
            margin-bottom: 16px
        }

        .fgroup {
            display: flex;
            flex-direction: column;
            gap: 5px;
            margin-bottom: 14px
        }

        label {
            font-size: 12px;
            font-weight: 600;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: .5px
        }

        input, select {
            padding: 11px 14px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-family: var(--font);
            font-size: 14px;
            color: var(--text);
            background: #fff;
            outline: none;
            width: 100%
        }

            input:focus {
                border-color: var(--accent)
            }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 11px 20px;
            border-radius: 8px;
            font-family: var(--font);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all .15s;
            width: 100%
        }

        .btn-primary {
            background: var(--accent);
            color: #fff
        }

            .btn-primary:hover {
                background: var(--accent2)
            }

        .btn-outline {
            background: #fff;
            border: 1px solid var(--border);
            color: var(--text)
        }

            .btn-outline:hover {
                border-color: var(--accent);
                color: var(--accent)
            }

        .camera-area {
            background: linear-gradient(135deg,#1e2d4a,#243558);
            border-radius: 16px;
            padding: 30px 20px;
            text-align: center;
            margin-bottom: 16px;
            cursor: pointer
        }

            .camera-area:active {
                opacity: 0.8
            }

        .camera-icon {
            font-size: 64px;
            margin-bottom: 12px
        }

        .camera-area p {
            color: #fff;
            margin-bottom: 4px
        }

        .hint {
            font-size: 11px;
            color: rgba(255,255,255,.5)
        }

        .preview-area {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            text-align: center;
            margin-top: 16px
        }

        .preview-img {
            max-width: 100%;
            border-radius: 12px;
            margin-bottom: 12px;
            border: 2px solid var(--accent)
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 20px 0;
            color: var(--muted);
            font-size: 12px
        }

            .divider::before, .divider::after {
                content: '';
                flex: 1;
                height: 1px;
                background: var(--border)
            }

        .result-card {
            border-radius: 14px;
            padding: 24px;
            text-align: center
        }

            .result-card.success {
                background: #f0fdf4;
                border: 1px solid #86efac
            }

            .result-card.error {
                background: #fef2f2;
                border: 1px solid #fca5a5
            }

            .result-card.info {
                background: #eff6ff;
                border: 1px solid #93c5fd
            }

            .result-card.warning {
                background: #fffbeb;
                border: 1px solid #fcd34d
            }

        .result-icon {
            font-size: 44px;
            margin-bottom: 10px
        }

        .result-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 6px
        }

        .result-msg {
            font-size: 13px;
            color: var(--muted);
            line-height: 1.5;
            margin-bottom: 16px
        }

        .spill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 18px;
            border-radius: 99px;
            font-weight: 700;
            font-size: 13px
        }

        .sp-present {
            background: #dcfce7;
            color: #15803d
        }

        .sp-late {
            background: #fef9c3;
            color: #854d0e
        }

        .sp-wait {
            background: #e0f2fe;
            color: #0369a1
        }

        .att-table {
            width: 100%;
            border-collapse: collapse
        }

            .att-table th {
                text-align: left;
                padding: 8px 14px;
                font-size: 11px;
                font-weight: 600;
                color: var(--muted);
                background: #f8fafc;
                border-bottom: 1px solid var(--border)
            }

            .att-table td {
                padding: 10px 14px;
                border-bottom: 1px solid #f1f5f9;
                font-size: 13px
            }

        /* Session list (like new but classic style) */
        .session-item {
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px 14px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all .15s
        }

            .session-item:hover, .session-item.selected {
                border-color: var(--accent);
                background: #eff6ff
            }

        .session-name {
            font-size: 14px;
            font-weight: 600
        }

        .session-meta {
            font-size: 11px;
            color: var(--muted);
            margin-top: 2px
        }

        .session-badge {
            font-size: 10px;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 20px;
            display: inline-block
        }

        .badge-open {
            background: #dcfce7;
            color: #15803d
        }

        .badge-wait {
            background: #fef9c3;
            color: #854d0e
        }

        .badge-closing {
            background: #dbeafe;
            color: #1e40af
        }

        .scan-status-banner {
            background: #f8fafc;
            border-left: 4px solid var(--accent);
            padding: 14px 16px;
            border-radius: 12px;
            margin-bottom: 20px
        }

        .scan-status-title {
            font-weight: 700;
            font-size: 14px;
            margin-bottom: 4px
        }

        .scan-status-desc {
            font-size: 12px;
            color: var(--muted);
            line-height: 1.4
        }

        /* mobile bottom nav */
        .bottom-nav {
            display: none
        }

        @media(max-width:700px) {
            .sidebar {
                display: none
            }

            body {
                overflow: auto
            }

            .content {
                padding: 16px;
                padding-bottom: 76px
            }

            .topbar {
                padding: 0 16px
            }

            .bottom-nav {
                display: flex;
                position: fixed;
                bottom: 0;
                left: 0;
                right: 0;
                background: var(--sidebar);
                border-top: 1px solid rgba(255,255,255,.08);
                z-index: 50;
                height: 60px;
            }

            .bn-item {
                flex: 1;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                color: rgba(255,255,255,.5);
                font-size: 10px;
                font-weight: 600;
                gap: 3px;
                cursor: pointer;
            }

                .bn-item.active {
                    color: #fff
                }

                .bn-item .bn-icon {
                    font-size: 20px
                }
        }

        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: #1e293b;
            color: #fff;
            padding: 11px 20px;
            border-radius: 10px;
            font-size: 13px;
            transition: transform .3s;
            z-index: 200;
            white-space: nowrap;
            max-width: 90vw;
            white-space: normal;
            text-align: center
        }

            .toast.show {
                transform: translateX(-50%) translateY(0)
            }

        #loginScreen {
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 999
        }

        .login-box {
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 40px;
            width: 360px;
            max-width: 92vw;
            box-shadow: 0 20px 60px rgba(0,0,0,.08)
        }

        .login-logo {
            font-size: 26px;
            font-weight: 800;
            color: var(--accent);
            letter-spacing: 2px;
            margin-bottom: 4px
        }

        .login-sub {
            font-size: 13px;
            color: var(--muted);
            margin-bottom: 28px
        }

        .login-hint {
            font-size: 12px;
            color: var(--muted);
            margin-top: 14px;
            text-align: center
        }

        .hidden {
            display: none
        }
    </style>
</head>
<body>

    <div id="loginScreen">
        <div class="login-box">
            <div class="login-logo">FLEX</div>
            <div class="login-sub">Student Portal · FAST-NUCES Lahore</div>
            <div class="fgroup">
                <label>Roll Number</label>
                <input id="loginRoll" placeholder="24L-3001" style="text-transform:uppercase">
            </div>
            <div class="fgroup">
                <label>Password</label>
                <input id="loginPass" type="password" placeholder="••••••">
            </div>
            <button class="btn btn-primary" id="loginBtn">Sign In →</button>
            <div class="login-hint">Default password: <code>pass</code></div>
        </div>
    </div>

    <nav class="sidebar">
        <div class="sidebar-brand"><div class="brand-logo">FLEX</div><div class="brand-sub">Student Portal</div></div>
        <div class="sidebar-user"><div class="user-name" id="sidebarName">—</div><div class="user-roll" id="sidebarRoll">—</div></div>
        <div style="padding:12px 0;flex:1">
            <div class="nav-section">Academic</div>
            <div class="nav-item active" onclick="showPage('attendance')"><span class="icon">✅</span>Attendance</div>
            <div class="nav-item" onclick="showPage('marks')"><span class="icon">📊</span>Marks &amp; Grades<span class="coming">Soon</span></div>
            <div class="nav-item" onclick="showPage('transcript')"><span class="icon">📄</span>Transcript<span class="coming">Soon</span></div>
        </div>
        <div class="sidebar-logout"><div class="logout-btn" onclick="doLogout()">⬅ Sign Out</div></div>
    </nav>

    <div class="main">
        <div class="topbar"><div class="topbar-title" id="topbarTitle">Attendance</div><div style="font-size:13px;color:var(--muted)" id="topbarUser">—</div></div>
        <div class="content" id="pageContent"></div>
    </div>

    <div class="bottom-nav">
        <div class="bn-item active" onclick="showPage('attendance')"><span class="bn-icon">✅</span>Attendance</div>
        <div class="bn-item" onclick="showPage('marks')"><span class="bn-icon">📊</span>Marks</div>
        <div class="bn-item" onclick="showPage('transcript')"><span class="bn-icon">📄</span>Transcript</div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // GLOBAL STATE
        let student = null;
        let selectedSession = null;        // { sessionId, topic, status, courseCode }
        let sessionsList = [];
        let pollInterval = null;

        // Helper: Toast
        function toast(msg, isErr = false) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            if (isErr) t.style.background = '#b91c1c';
            else t.style.background = '#1e293b';
            setTimeout(() => t.classList.remove('show'), 2800);
        }

        // ----------------------------- LOGIN ---------------------------------
        async function doLogin() {
            const rollNo = document.getElementById('loginRoll').value.trim().toUpperCase();
            const pass = document.getElementById('loginPass').value.trim();
            if (!rollNo || !pass) { toast('Please enter roll number and password', true); return; }
            const btn = document.getElementById('loginBtn');
            btn.textContent = 'Signing in…'; btn.disabled = true;
            try {
                const r = await fetch('/api/student/login', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ rollNo, pass })
                });
                const data = await r.json();
                if (!r.ok) throw new Error(data.error || 'Invalid credentials');
                student = data;
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('sidebarName').textContent = student.name;
                document.getElementById('sidebarRoll').textContent = student.rollNo;
                document.getElementById('topbarUser').textContent = student.name;
                if (pollInterval) clearInterval(pollInterval);
                pollInterval = setInterval(() => { if (student) refreshSessionsList(); }, 5000);
                showPage('attendance');
                toast(`Welcome ${student.name}`);
            } catch (e) { toast(e.message, true); }
            finally { btn.textContent = 'Sign In →'; btn.disabled = false; }
        }

        function doLogout() {
            if (!confirm('Sign out?')) return;
            student = null; selectedSession = null;
            if (pollInterval) clearInterval(pollInterval);
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('sidebarName').textContent = '—';
            document.getElementById('sidebarRoll').textContent = '—';
        }

        // ----------------------------- PAGE ROUTER ---------------------------
        function showPage(page) {
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.querySelectorAll('.bn-item').forEach(n => n.classList.remove('active'));
            document.querySelectorAll('.nav-item,.bn-item').forEach(n => {
                if ((n.getAttribute('onclick') || '').includes(`'${page}'`)) n.classList.add('active');
            });
            document.getElementById('topbarTitle').textContent = page === 'attendance' ? 'Attendance' : page;
            const container = document.getElementById('pageContent');
            if (page === 'attendance') renderAttendancePage(container);
            else container.innerHTML = `<div class="coming-page"><div class="coming-icon">🔧</div><div class="coming-title">Coming Soon</div><div class="coming-sub">This feature will be available soon.</div></div>`;
        }

        // --------------------------- ATTENDANCE PAGE (merged new logic with old UI) ----------
        async function renderAttendancePage(container) {
            container.innerHTML = `
            <div id="sessionListCard" class="card">
              <div class="card-title">📋 Active Sessions</div>
              <div id="sessionsContainer" style="margin-bottom:8px">Loading sessions...</div>
              <button class="btn btn-outline" onclick="refreshSessionsList()" style="margin-top:4px">↻ Refresh</button>
            </div>
            <div id="sessionStatusMessage" class="scan-status-banner" style="display:none"></div>
            <div class="card" id="scanCard">
              <div class="card-title">📡 Mark Attendance</div>
              <div class="camera-area" onclick="openCameraQR()">
                <div class="camera-icon">📷</div>
                <p>Tap to Scan QR Code</p>
                <p class="hint">Scan the QR shown on faculty screen</p>
              </div>
              <div class="divider">OR</div>
              <div class="fgroup">
                <label>MANUAL TOKEN (8 chars)</label>
                <input id="manualToken" placeholder="e.g. AB3XY9KL" maxlength="8" style="text-transform:uppercase;font-family:monospace;letter-spacing:1px">
              </div>
              <button class="btn btn-primary" id="submitManualBtn" onclick="submitManualAttendance()">Record Attendance</button>
              <div id="scanResultArea" style="margin-top:16px"></div>
            </div>
            <div class="card" id="historyCard">
              <div class="card-title">📜 Attendance History</div>
              <div id="histContent">Loading...</div>
            </div>
          `;
            await refreshSessionsList();
            await loadHistory();
        }

        // ---------- Fetch sessions (new api) ----------
        async function refreshSessionsList() {
            if (!student) return;
            try {
                const r = await fetch('/api/sessions');
                const allSessions = await r.json();
                sessionsList = allSessions.filter(s => !s.locked && s.section === student.section);
                const container = document.getElementById('sessionsContainer');
                if (!container) return;
                if (sessionsList.length === 0) {
                    container.innerHTML = `<div style="color:var(--muted);text-align:center;padding:16px">No active sessions for your section.</div>`;
                    selectedSession = null;
                    document.getElementById('sessionStatusMessage').style.display = 'none';
                    return;
                }
                container.innerHTML = sessionsList.map(s => {
                    let statusIcon = '', badgeClass = '';
                    if (s.status === 'opening') { statusIcon = '🟢 Opening'; badgeClass = 'badge-open'; }
                    else if (s.status === 'opening_locked') { statusIcon = '⏳ Opening locked'; badgeClass = 'badge-wait'; }
                    else if (s.status === 'closing') { statusIcon = '🔁 Closing window'; badgeClass = 'badge-closing'; }
                    else { statusIcon = s.status; badgeClass = ''; }
                    const isSelected = (selectedSession && selectedSession.sessionId === s.sessionId);
                    return `<div class="session-item ${isSelected ? 'selected' : ''}" data-sid="${s.sessionId}" onclick="selectSessionFromList('${s.sessionId}','${(s.topic || '').replace(/'/g, "\\'")}','${s.status}','${s.courseCode || ''}')">
                <div style="display:flex;justify-content:space-between;align-items:center">
                  <div><div class="session-name">${s.topic || 'Attendance Session'}</div><div class="session-meta">${s.courseCode || ''} · ${s.section}</div></div>
                  <div><span class="session-badge ${badgeClass}">${statusIcon}</span></div>
                </div>
              </div>`;
                }).join('');
                // keep selected session if still exists
                if (selectedSession && !sessionsList.find(s => s.sessionId === selectedSession.sessionId)) {
                    selectedSession = null;
                    document.getElementById('sessionStatusMessage').style.display = 'none';
                } else if (selectedSession) {
                    updateStatusBanner(selectedSession.status);
                }
            } catch (e) { console.error(e); }
        }

        window.selectSessionFromList = function (sid, topic, status, courseCode) {
            selectedSession = { sessionId: sid, topic, status, courseCode };
            refreshSessionsList(); // re-render to highlight
            updateStatusBanner(status);
            // clear manual token & result area
            const manualInput = document.getElementById('manualToken');
            if (manualInput) manualInput.value = '';
            const resultDiv = document.getElementById('scanResultArea');
            if (resultDiv) resultDiv.innerHTML = '';
            toast(`Selected: ${topic || 'Session'}`);
        }

        function updateStatusBanner(status) {
            const bannerDiv = document.getElementById('sessionStatusMessage');
            if (!bannerDiv) return;
            if (!selectedSession) { bannerDiv.style.display = 'none'; return; }
            bannerDiv.style.display = 'block';
            if (status === 'opening') {
                bannerDiv.innerHTML = `<div class="scan-status-title">🟢 Opening Window Active</div><div class="scan-status-desc">Token changes every 30 sec. Enter the token shown on projector. You will be marked after both windows.</div>`;
            } else if (status === 'opening_locked') {
                bannerDiv.innerHTML = `<div class="scan-status-title">⏳ Opening Window Closed</div><div class="scan-status-desc">Faculty has locked the opening window. Wait for the closing window to start, then scan again.</div>`;
            } else if (status === 'closing') {
                bannerDiv.innerHTML = `<div class="scan-status-title">🔁 Closing Window Active</div><div class="scan-status-desc">If you already scanned during opening, scan now to be marked PRESENT. First-time scanners become LATE.</div>`;
            } else {
                bannerDiv.innerHTML = `<div class="scan-status-title">📌 Session Ready</div><div class="scan-status-desc">Use the token from the projector.</div>`;
            }
        }

        // ---------- QR SCAN (old camera method + new parsing) ----------
        function openCameraQR() {
            if (!selectedSession) { toast('Please select a session first', true); return; }
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.capture = 'environment';
            input.onchange = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const previewDiv = document.createElement('div');
                previewDiv.className = 'preview-area';
                previewDiv.innerHTML = `<img id="qrPreviewImg" class="preview-img"><div style="color:#58a6ff">🔍 Decoding QR...</div>`;
                const scanCard = document.getElementById('scanCard');
                const oldResult = document.getElementById('scanResultArea');
                if (oldResult) oldResult.innerHTML = '';
                const container = document.getElementById('pageContent');
                const existingPrev = document.getElementById('tempPreview');
                if (existingPrev) existingPrev.remove();
                previewDiv.id = 'tempPreview';
                scanCard.insertAdjacentElement('afterend', previewDiv);
                const imgUrl = URL.createObjectURL(file);
                const imgElem = document.getElementById('qrPreviewImg');
                imgElem.src = imgUrl;
                const img = new Image();
                img.src = imgUrl;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    const getOrientation = (file, cb) => {
                        const reader = new FileReader();
                        reader.onload = e => {
                            const view = new DataView(e.target.result);
                            if (view.getUint16(0, false) !== 0xFFD8) return cb(-2);
                            const length = view.byteLength;
                            let offset = 2;
                            while (offset < length) {
                                if (view.getUint16(offset + 2, false) <= 8) return cb(-1);
                                const marker = view.getUint16(offset, false);
                                offset += 2;
                                if (marker === 0xFFE1) {
                                    if (view.getUint32(offset += 2, false) !== 0x45786966) return cb(-1);
                                    const little = view.getUint16(offset += 6, false) === 0x4949;
                                    offset += view.getUint32(offset + 4, little);
                                    const tags = view.getUint16(offset, little);
                                    offset += 2;
                                    for (let i = 0; i < tags; i++)
                                        if (view.getUint16(offset + (i * 12), little) === 0x0112)
                                            return cb(view.getUint16(offset + (i * 12) + 8, little));
                                } else if ((marker & 0xFF00) !== 0xFF00) break;
                                else offset += view.getUint16(offset, false);
                            }
                            return cb(-1);
                        };
                        reader.readAsArrayBuffer(file.slice(0, 65536));
                    };
                    getOrientation(file, orientation => {
                        let width = Math.min(img.width, 500);
                        let height = (img.height * width) / img.width;
                        const swapped = orientation >= 5 && orientation <= 8;
                        canvas.width = swapped ? height : width;
                        canvas.height = swapped ? width : height;
                        ctx.save();
                        if (orientation === 2) { ctx.transform(-1, 0, 0, 1, canvas.width, 0); }
                        else if (orientation === 3) { ctx.transform(-1, 0, 0, -1, canvas.width, canvas.height); }
                        else if (orientation === 4) { ctx.transform(1, 0, 0, -1, 0, canvas.height); }
                        else if (orientation === 5) { ctx.transform(0, 1, 1, 0, 0, 0); }
                        else if (orientation === 6) { ctx.transform(0, 1, -1, 0, canvas.height, 0); }
                        else if (orientation === 7) { ctx.transform(0, -1, -1, 0, canvas.height, canvas.width); }
                        else if (orientation === 8) { ctx.transform(0, -1, 1, 0, 0, canvas.width); }
                        ctx.drawImage(img, 0, 0, width, height);
                        ctx.restore();
                        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                        const code = jsQR(imageData.data, imageData.width, imageData.height);
                        if (code) {
                            parseQRData(code.data);
                        } else {
                            previewDiv.innerHTML = `<div class="preview-area"><div style="color:#dc2626;">❌ No QR code found</div><button class="btn btn-outline" onclick="closePreview()">Try Again</button></div>`;
                        }
                        URL.revokeObjectURL(imgUrl);
                    });
                };
                img.onerror = () => { previewDiv.innerHTML = `<div>Image error</div><button class="btn btn-outline" onclick="closePreview()">Close</button>`; };
            };
            input.click();
        }

        window.closePreview = function () {
            const prev = document.getElementById('tempPreview');
            if (prev) prev.remove();
        };

        function parseQRData(qrString) {
            closePreview();
            const parts = qrString.split('|');
            if (parts.length !== 2) { toast('Invalid QR format (expected sessionId|token)', true); return; }
            const [qrSessionId, qrToken] = parts;
            if (!selectedSession || selectedSession.sessionId !== qrSessionId) {
                // try to find session in active list if not selected
                const matching = sessionsList.find(s => s.sessionId === qrSessionId);
                if (matching) {
                    selectSessionFromList(matching.sessionId, matching.topic, matching.status, matching.courseCode);
                } else {
                    toast('QR belongs to a session not available for your section', true);
                    return;
                }
            }
            executeAttendance(qrSessionId, qrToken);
        }

        // ---------- Manual attendance ----------
        window.submitManualAttendance = function () {
            if (!selectedSession) { toast('Please select a session from the list above', true); return; }
            const token = document.getElementById('manualToken').value.trim().toUpperCase();
            if (!token) { toast('Enter the 8-character token', true); return; }
            if (token.length < 6) { toast('Token should be at least 6 characters', true); return; }
            executeAttendance(selectedSession.sessionId, token);
        }

        async function executeAttendance(sessionId, token) {
            const resultDiv = document.getElementById('scanResultArea');
            if (!resultDiv) return;
            resultDiv.innerHTML = `<div style="text-align:center;padding:12px">⏳ Recording...</div>`;
            try {
                const resp = await fetch('/api/student/scan', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ rollNo: student.rollNo, sessionId, token })
                });
                const data = await resp.json();
                if (!resp.ok) {
                    const code = data.code || '';
                    let msg = data.error || 'Scan failed';
                    let title = 'Failed', icon = '❌';
                    if (code === 'DUPLICATE') { title = 'Already Recorded'; msg = 'Your attendance is already recorded for this session.'; icon = '⚠️'; }
                    else if (code === 'WAIT_FOR_CLOSING') { title = 'Opening Recorded'; msg = 'Opening recorded! Scan again during closing window to be marked PRESENT.'; icon = '⏳'; }
                    else if (code === 'OPENING_LOCKED') { title = 'Opening Closed'; msg = 'Opening window is closed. Wait for closing window to start.'; icon = '🔒'; }
                    else if (code === 'EXPIRED') { title = 'Token Expired'; msg = 'Token expired. Please scan the new QR/enter fresh token.'; icon = '⏰'; }
                    resultDiv.innerHTML = `<div class="result-card error"><div class="result-icon">${icon}</div><div class="result-title">${title}</div><div class="result-msg">${msg}</div><button class="btn btn-outline" onclick="document.getElementById('scanResultArea').innerHTML=''">Dismiss</button></div>`;
                    if (code === 'WAIT_FOR_CLOSING') toast('📝 Opening recorded! Scan again during closing window.');
                    else toast(msg, true);
                } else {
                    const st = data.currentStatus || 'Success';
                    let title = st, icon = '✅', resultClass = 'success';
                    if (st === 'Late') { title = 'Marked Late'; icon = '⏰'; resultClass = 'warning'; }
                    else if (st === 'Present') { title = 'Marked Present!'; icon = '🎉'; }
                    else if (st === 'Opening Recorded') { title = 'Opening Recorded'; icon = '📝'; resultClass = 'info'; }
                    resultDiv.innerHTML = `<div class="result-card ${resultClass}"><div class="result-icon">${icon}</div><div class="result-title">${title}</div><div class="result-msg">${data.message || 'Attendance recorded'}</div><button class="btn btn-outline" onclick="document.getElementById('scanResultArea').innerHTML=''">OK</button></div>`;
                    toast(data.message || 'Success');
                    await loadHistory();
                    await refreshSessionsList();
                    if (document.getElementById('manualToken')) document.getElementById('manualToken').value = '';
                }
            } catch (e) {
                resultDiv.innerHTML = `<div class="result-card error"><div class="result-icon">❌</div><div class="result-title">Network Error</div><div class="result-msg">Check your connection.</div><button class="btn btn-outline" onclick="document.getElementById('scanResultArea').innerHTML=''">Close</button></div>`;
                toast('Server error', true);
            }
        }

        // ---------- Attendance History (enhanced summary + table) ----------
        async function loadHistory() {
            const histDiv = document.getElementById('histContent');
            if (!histDiv || !student) return;
            try {
                const r = await fetch(`/api/student/${student.rollNo}/attendance`);
                const data = await r.json();
                if (!data.records || data.records.length === 0) {
                    histDiv.innerHTML = '<div style="color:var(--muted);text-align:center;padding:16px">No attendance records yet.</div>';
                    return;
                }
                const present = data.present || 0, late = data.late || 0, absent = data.absent || 0;
                const overallPct = data.pct || 0;
                const coursesSet = [...new Set(data.records.map(r => r.courseCode).filter(Boolean))];
                let filterHtml = '';
                if (coursesSet.length > 1) {
                    filterHtml = `<select id="histFilterCourse" onchange="filterHistoryTable()" style="width:100%;margin-bottom:12px;padding:8px;border-radius:8px;border:1px solid var(--border)"><option value="">All Courses</option>${coursesSet.map(c => `<option value="${c}">${c}</option>`).join('')}</select>`;
                }
                histDiv.innerHTML = `
              <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px">
                <div style="background:#f8fafc;border-radius:10px;padding:12px;text-align:center"><div style="font-size:24px;font-weight:700;color:#16a34a">${present}</div><div style="font-size:10px;color:var(--muted)">PRESENT</div></div>
                <div style="background:#f8fafc;border-radius:10px;padding:12px;text-align:center"><div style="font-size:24px;font-weight:700;color:#ca8a04">${late}</div><div style="font-size:10px;color:var(--muted)">LATE</div></div>
                <div style="background:#f8fafc;border-radius:10px;padding:12px;text-align:center"><div style="font-size:24px;font-weight:700;color:#dc2626">${absent}</div><div style="font-size:10px;color:var(--muted)">ABSENT</div></div>
              </div>
              <div style="background:#eef2ff;border-radius:10px;padding:8px;text-align:center;margin-bottom:16px"><span style="font-weight:700">Overall attendance: ${overallPct}%</span> (Present+Late counted)</div>
              ${filterHtml}
              <div id="historyTableWrap">${renderHistoryTable(data.records)}</div>
            `;
                window.fullHistoryRecords = data.records;
            } catch (e) { histDiv.innerHTML = '<div style="color:var(--red)">Failed to load history</div>'; }
        }

        window.filterHistoryTable = function () {
            const filter = document.getElementById('histFilterCourse')?.value;
            if (!window.fullHistoryRecords) return;
            const filtered = filter ? window.fullHistoryRecords.filter(r => r.courseCode === filter) : window.fullHistoryRecords;
            const wrap = document.getElementById('historyTableWrap');
            if (wrap) wrap.innerHTML = renderHistoryTable(filtered);
        };

        function renderHistoryTable(records) {
            if (!records.length) return '<div style="padding:16px;text-align:center">No records</div>';
            return `<table class="att-table"><thead><tr><th>Date</th><th>Course</th><th>Status</th></tr></thead><tbody>${records.map(r => {
                const dateObj = new Date(Number(r.date));
                const dateStr = isNaN(dateObj.getTime()) ? '—' : dateObj.toLocaleDateString('en-PK', { month: 'short', day: 'numeric', year: 'numeric' });
                let badgeClass = 'sp-error', label = r.status;
                if (r.status === 'Present') { badgeClass = 'sp-present'; label = 'Present'; }
                else if (r.status === 'Late') { badgeClass = 'sp-late'; label = 'Late'; }
                else if (r.status === 'Opening Only') { badgeClass = 'sp-wait'; label = 'Opening only'; }
                return `<tr><td>${dateStr}</td><td style="font-family:var(--mono)">${r.courseCode || '—'}</td><td><span class="spill ${badgeClass}">${label}</span></td></tr>`;
            }).join('')}</tbody></table>`;
        }

        // INITIAL EVENT LISTENERS
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('loginBtn')?.addEventListener('click', doLogin);
            const roll = document.getElementById('loginRoll'), passw = document.getElementById('loginPass');
            if (roll) roll.addEventListener('keypress', e => { if (e.key === 'Enter') doLogin(); });
            if (passw) passw.addEventListener('keypress', e => { if (e.key === 'Enter') doLogin(); });
        });
    </script>
</body>
